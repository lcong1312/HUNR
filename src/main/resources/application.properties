############################################################
# ====== LEGACY DATABASE KEYS (Config.load) ===============
############################################################
database.port=3306
database.host=localhost
database.name=hunr
database.user=root
############################################################
# ====== SPRING DATASOURCE ================================
############################################################
spring.datasource.url=jdbc:mysql://localhost:3306/hunr?useUnicode=true&characterEncoding=utf8&rewriteBatchedStatements=true&serverTimezone=Asia/Bangkok
spring.datasource.username=root
spring.datasource.hikari.pool-name=GamePool
spring.datasource.hikari.maximum-pool-size=128
spring.datasource.hikari.minimum-idle=32
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-init-sql=SET time_zone = '+07:00'
############################################################
# ====== SPRING BOOT PORT =================================
############################################################
server.port=1707
############################################################
# ====== JPA / HIBERNATE ==================================
############################################################
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Bangkok
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
############################################################
# ====== ACTUATOR & LOGGING ===============================
############################################################
management.endpoints.web.exposure.include=health,metrics,threaddump,heapdump
management.endpoint.health.show-details=never
logging.level.com.zaxxer.hikari=INFO
logging.level.org.hibernate.SQL=ERROR
